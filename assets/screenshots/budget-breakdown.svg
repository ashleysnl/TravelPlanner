  <rect width="1400" height="820" fill="#f6f9ff"/>
  <rect x="38" y="36" width="1324" height="748" rx="24" fill="#fff" stroke="#e8edf5"/>
  <text x="74" y="92" fill="#162033" font-size="38" font-weight="700" font-family="Arial">Budget Dashboard</text>
  <text x="74" y="124" fill="#6b7280" font-size="18" font-family="Arial">Planned vs paid totals and category breakdown (all values converted to CDN)</text>
